services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mindmirror-backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./analytics:/app/analytics
    networks:
      - mindmirror-network

  supabase-db:
    image: supabase/postgres:15.1.0.147
    container_name: supabase-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/migrations:/docker-entrypoint-initdb.d
    networks:
      - mindmirror-network

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: supabase-db
    networks:
      - mindmirror-network

networks:
  mindmirror-network:
    driver: bridge
    name: mindmirror-network
