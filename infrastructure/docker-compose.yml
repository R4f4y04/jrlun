version: '3.8'

services:
  supabase-db:
    image: supabase/postgres:15.1.1.06
    container_name: supabase-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - mindmirror-network

networks:
  mindmirror-network:
    driver: bridge
    name: mindmirror-network
